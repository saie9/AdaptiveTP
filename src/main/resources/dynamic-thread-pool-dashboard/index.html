<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动态线程池监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
/* 顶栏 */
.topbar{background:#1e293b;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.topbar h1{color:#38bdf8;font-size:18px}
.topbar .info{font-size:12px;color:#64748b;display:flex;gap:16px;align-items:center}
.topbar .info .dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* 主布局 */
.main{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px 20px;max-width:1400px;margin:0 auto}
.card{background:#1e293b;border-radius:10px;padding:16px;border:1px solid #334155}
.card.full{grid-column:1/-1}
.card h2{color:#38bdf8;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
/* 指标格子 */
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mi{background:#0f172a;border-radius:6px;padding:10px;text-align:center}
.mi .l{font-size:10px;color:#64748b;margin-bottom:2px}
.mi .v{font-size:20px;font-weight:700}
.v.ok{color:#4ade80}.v.warn{color:#fbbf24}.v.danger{color:#ef4444}.v.normal{color:#f1f5f9}
/* 按钮 */
.btn{padding:6px 14px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.btn:hover{transform:translateY(-1px)}
.bg{background:#22c55e;color:#fff}.by{background:#eab308;color:#1e293b}.br{background:#ef4444;color:#fff}.bb{background:#3b82f6;color:#fff}.bgr{background:#475569;color:#e2e8f0}
.btn-sm{padding:3px 10px;font-size:11px}
/* 表单 */
select,input{background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:5px;padding:5px 8px;font-size:12px}
input[type=number]{width:65px}input[type=time]{width:90px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
/* 表格 */
table{width:100%;border-collapse:collapse;font-size:11px}
th{background:#334155;padding:6px;color:#64748b;text-align:center}
td{padding:5px 6px;text-align:center;border-bottom:1px solid #0f172a}
/* Canvas */
canvas{width:100%;height:160px;border-radius:6px;background:#0f172a}
/* 日志 */
#logBox{background:#0f172a;border-radius:6px;padding:10px;height:150px;overflow-y:auto;font-family:Consolas,monospace;font-size:11px;line-height:1.5}
.li{color:#38bdf8}.lw{color:#fbbf24}.le{color:#ef4444}.lo{color:#4ade80}
/* 计划行 */
.srow{display:flex;gap:6px;align-items:center;margin-bottom:6px;padding:6px 8px;background:#0f172a;border-radius:6px;font-size:12px}
.srow label{color:#64748b;min-width:32px;font-size:11px}
/* 邮箱 tag */
.etag{display:inline-flex;align-items:center;gap:4px;background:#334155;border-radius:4px;padding:3px 8px;font-size:11px;color:#e2e8f0}
.etag .ex{cursor:pointer;color:#ef4444;font-weight:bold;margin-left:2px;font-size:13px}
.etag .ex:hover{color:#f87171}
.dchk{display:flex;gap:3px}.dchk label{min-width:auto;display:flex;align-items:center;gap:1px;font-size:10px}.dchk input{width:13px;height:13px;accent-color:#38bdf8}
/* JVM 资源条 */
.bar-wrap{background:#0f172a;border-radius:4px;height:20px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-text{position:absolute;top:0;left:0;right:0;text-align:center;line-height:20px;font-size:10px;color:#e2e8f0;font-weight:600}
</style>
</head>
<body>
<div class="topbar">
  <h1>🔧 动态线程池监控</h1>
  <div class="info">
    <span id="instanceInfo" style="color:#94a3b8;font-size:11px"></span>
    <span><span class="dot"></span> 运行中</span>
    <label><input type="checkbox" id="chkAuto" checked style="accent-color:#38bdf8"> 自动刷新 3s</label>
  </div>
</div>
<div class="main">
  <!-- 线程池状态卡片 -->
  <div id="poolCards" style="display:contents"></div>

  <!-- JVM 资源概览 -->
  <div class="card full" id="jvmCard">
    <h2>🖥 JVM 资源概览</h2>
    <div id="jvmContent" class="mg" style="grid-template-columns:repeat(4,1fr)"></div>
  </div>

  <!-- 趋势图 -->
  <div class="card full">
    <h2>📈 实时趋势</h2>
    <div id="chartArea"></div>
  </div>

  <!-- 压测 + 手动调参 -->
  <div class="card">
    <h2>🎮 压测控制</h2>
    <div class="row">
      <select id="selPool"></select>
      <label>速率</label><input type="number" id="inRate" value="5" min="1" max="100">
      <label>耗时ms</label><input type="number" id="inSleep" value="3000" min="100" step="500">
    </div>
    <div class="row">
      <button class="btn bg" onclick="sustainedStart()">▶ 持续</button>
      <button class="btn br" onclick="sustainedStop()">⏹ 停止</button>
      <button class="btn by" onclick="oneShot()">⚡ 单次</button>
      <input type="number" id="inCount" value="30" min="1" max="200">
    </div>
  </div>
  <div class="card">
    <h2>🔧 手动调参</h2>
    <div class="row">
      <select id="adjPool"></select>
      <label>Core</label><input type="number" id="adjCore" value="5" min="1">
      <label>Max</label><input type="number" id="adjMax" value="10" min="1">
      <button class="btn bb" onclick="manualAdjust()">应用</button>
    </div>
    <p style="font-size:11px;color:#475569;margin-top:4px">直接修改线程池参数，立即生效</p>
  </div>

  <!-- 计划模式 -->
  <div class="card full">
    <h2>📅 计划模式</h2>
    <div class="row">
      <select id="schedPool" onchange="loadSchedule()"></select>
      <button class="btn bb btn-sm" onclick="addSchedRow()">+ 添加</button>
      <button class="btn bg btn-sm" onclick="saveSched()">💾 保存</button>
      <button class="btn br btn-sm" onclick="clearSched()">🗑 清空</button>
      <span style="flex:1"></span>
      <span style="font-size:10px;color:#475569">计划值 = 自适应缩容下限</span>
    </div>
    <div id="schedRows"></div>
  </div>

  <!-- 调参历史 + 快照 -->
  <div class="card">
    <h2>📜 调参历史</h2>
    <div id="historyArea" style="max-height:220px;overflow-y:auto"></div>
  </div>
  <div class="card">
    <h2>📊 采集快照</h2>
    <div id="snapshotArea" style="max-height:220px;overflow-y:auto"></div>
  </div>

  <!-- 报警配置 + 报警记录 -->
  <div class="card">
    <h2>🚨 报警配置</h2>
    <div class="row">
      <label><input type="checkbox" id="alertEnabled" style="accent-color:#ef4444"> 启用报警</label>
    </div>
    <div style="font-size:11px;color:#64748b;margin-bottom:4px">收件人列表</div>
    <div id="emailTags" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px"></div>
    <div class="row">
      <input type="email" id="newEmail" placeholder="输入邮箱后回车添加" style="flex:1;min-width:180px" onkeydown="if(event.key==='Enter'){event.preventDefault();addEmail()}">
      <button class="btn bb btn-sm" onclick="addEmail()">+ 添加</button>
    </div>
    <div class="row" style="font-size:11px;color:#64748b;margin-top:4px">报警类型</div>
    <div class="row">
      <label><input type="checkbox" id="atReject" checked style="accent-color:#ef4444"> 任务拒绝</label>
      <label><input type="checkbox" id="atActive" checked style="accent-color:#fbbf24"> 活跃率过高</label>
      <label><input type="checkbox" id="atQueue" checked style="accent-color:#fbbf24"> 队列过高</label>
      <label><input type="checkbox" id="atMemory" checked style="accent-color:#ef4444"> 内存过高</label>
    </div>
    <div class="row">
      <label>活跃率阈值</label><input type="number" id="alertActiveT" value="90" min="1" max="200" step="5" style="width:55px"><span style="font-size:10px;color:#64748b">%</span>
      <label>队列阈值</label><input type="number" id="alertQueueT" value="80" min="1" max="100" step="5" style="width:55px"><span style="font-size:10px;color:#64748b">%</span>
    </div>
    <div class="row">
      <label>内存阈值</label><input type="number" id="alertMemT" value="85" min="1" max="100" step="5" style="width:55px"><span style="font-size:10px;color:#64748b">%</span>
      <label>冷却(秒)</label><input type="number" id="alertCooldown" value="300" min="10" max="3600" step="10" style="width:65px">
    </div>
    <div class="row">
      <label>邮件间隔(秒)</label><input type="number" id="alertEmailInterval" value="60" min="10" max="3600" step="10" style="width:65px">
      <span style="font-size:10px;color:#475569">同类型冷却期内不重复，全局两封邮件间隔不小于此值</span>
    </div>
    <div class="row">
      <button class="btn bg" onclick="saveAlertConfig()">💾 保存配置</button>
    </div>
  </div>
  <div class="card">
    <h2>🚨 报警记录</h2>
    <div id="alertArea" style="max-height:260px;overflow-y:auto"></div>
  </div>

  <!-- 日志 -->
  <div class="card full">
    <h2>📝 操作日志</h2>
    <div id="logBox"></div>
  </div>
</div>

<script>
const API='/dtp/api';
let autoTimer=null;
const DN=['','一','二','三','四','五','六','日'];

function log(m,c='li'){const b=document.getElementById('logBox');b.innerHTML+=`<div class="${c}">[${new Date().toLocaleTimeString()}] ${m}</div>`;b.scrollTop=b.scrollHeight}
function mi(l,v,c='normal'){return`<div class="mi"><div class="l">${l}</div><div class="v ${c}">${v}</div></div>`}
function cc(r,w,d){const n=parseFloat(r);if(isNaN(n))return'normal';return n>=d?'danger':n>=w?'warn':'ok'}

// ==================== 状态 ====================
async function fetchStatus(){
  try{
    const r=await fetch(API+'/status');const j=await r.json();
    const c=document.getElementById('poolCards');
    const sel=document.getElementById('selPool'),adj=document.getElementById('adjPool'),sch=document.getElementById('schedPool');
    let html='',opts='';
    for(const[name,d]of Object.entries(j)){
      const ar=d.corePoolSize>0?(d.activeCount/d.corePoolSize*100).toFixed(0):0;
      const qc=d.queueSize+d.queueRemainingCapacity;
      const qr=qc>0?(d.queueSize/qc*100).toFixed(0):0;
      html+=`<div class="card"><h2>📦 ${name}</h2><div class="mg">`+
        mi('Core',d.corePoolSize)+mi('Max',d.maximumPoolSize)+mi('活跃',d.activeCount,cc(ar,60,90))+
        mi('活跃率',ar+'%',cc(ar,60,90))+mi('队列',d.queueSize,cc(qr,50,80))+mi('队列率',qr+'%',cc(qr,50,80))+
        mi('完成',d.completedTaskCount,'ok')+mi('线程数',d.poolSize)+mi('队列余',d.queueRemainingCapacity)+
        '</div></div>';
      opts+=`<option value="${name}">${name}</option>`;
    }
    c.innerHTML=html;
    if(!sel.options.length||sel.options.length!==Object.keys(j).length){
      [sel,adj,sch].forEach(s=>{const v=s.value;s.innerHTML=opts;if(v)s.value=v});
    }
  }catch(e){}
}

// ==================== JVM ====================
async function fetchJvm(){
  try{
    const r=await fetch(API+'/jvm');const j=await r.json();
    const memCls=j.heapUsageRate>85?'danger':j.heapUsageRate>60?'warn':'ok';
    const gcCls=j.gcTimeRate>10?'danger':j.gcTimeRate>5?'warn':'ok';
    document.getElementById('jvmContent').innerHTML=
      `<div class="mi"><div class="l">堆内存</div><div class="bar-wrap"><div class="bar-fill" style="width:${j.heapUsageRate}%;background:${memCls==='ok'?'#4ade80':memCls==='warn'?'#fbbf24':'#ef4444'}"></div><div class="bar-text">${j.heapUsedMB}/${j.heapMaxMB} MB (${j.heapUsageRate}%)</div></div></div>`+
      mi('GC耗时占比',j.gcTimeRate+'%',gcCls)+
      mi('管理线程总数',j.totalManagedThreads)+
      mi('CPU核数',j.availableProcessors)+
      mi('JVM线程数',j.threadCount)+
      mi('运行时间',Math.floor(j.uptimeSeconds/60)+'min')+
      mi('GC累计',j.gcTotalMs+'ms')+
      `<div class="mi"><div class="l">线程预算</div><div class="bar-wrap"><div class="bar-fill" style="width:${Math.min(j.totalManagedThreads/200*100,100)}%;background:#3b82f6"></div><div class="bar-text">${j.totalManagedThreads}/200</div></div></div>`;
  }catch(e){}
}

// ==================== 趋势图 ====================
async function fetchTrend(){
  try{
    const r=await fetch(API+'/trend?count=30');const j=await r.json();
    let html='';
    for(const[pool,d]of Object.entries(j)){
      const cid='chart_'+pool.replace(/[^a-zA-Z0-9]/g,'_');
      html+=`<div style="margin-bottom:10px"><span style="font-size:12px;color:#94a3b8">${pool}</span><canvas id="${cid}" height="160"></canvas></div>`;
    }
    document.getElementById('chartArea').innerHTML=html;
    for(const[pool,d]of Object.entries(j)){
      const cid='chart_'+pool.replace(/[^a-zA-Z0-9]/g,'_');
      drawChart(cid,d);
    }
  }catch(e){}
}
function drawChart(id,d){
  const canvas=document.getElementById(id);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth*2;canvas.height=320;
  const W=canvas.width,H=canvas.height,pad=50,gw=W-pad*2,gh=H-pad*2;
  ctx.clearRect(0,0,W,H);
  // 网格
  ctx.strokeStyle='#1e293b';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad+gh/4*i;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='18px sans-serif';ctx.textAlign='right';ctx.fillText((100-25*i)+'%',pad-6,y+5)}
  // 数据
  const n=d.times.length;if(n<2)return;
  function drawLine(arr,color,maxVal){
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=3;
    for(let i=0;i<n;i++){const x=pad+gw/(n-1)*i;const y=pad+gh*(1-Math.min(arr[i],maxVal)/maxVal);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.stroke();
  }
  drawLine(d.activeRates,'#f472b6',100);
  drawLine(d.queueRates,'#38bdf8',100);
  // X轴标签
  ctx.fillStyle='#475569';ctx.font='16px sans-serif';ctx.textAlign='center';
  const step=Math.max(1,Math.floor(n/6));
  for(let i=0;i<n;i+=step){const x=pad+gw/(n-1)*i;ctx.fillText(d.times[i],x,H-10)}
  // 图例
  ctx.font='18px sans-serif';
  ctx.fillStyle='#f472b6';ctx.fillText('● 活跃率',pad+60,24);
  ctx.fillStyle='#38bdf8';ctx.fillText('● 队列使用率',pad+200,24);
}

// ==================== 快照 ====================
async function fetchSnaps(){
  try{
    const r=await fetch(API+'/snapshots?count=5');const j=await r.json();
    let html='';
    for(const[p,ss]of Object.entries(j)){
      html+=`<div style="font-size:11px;color:#64748b;margin:4px 0">${p}</div>`;
      if(!ss||!ss.length){html+='<div style="color:#334155;font-size:11px">暂无</div>';continue}
      html+='<table><tr><th>时间</th><th>Core</th><th>Max</th><th>活跃</th><th>活跃率</th><th>队列</th><th>使用率</th><th>拒绝</th></tr>';
      for(const s of ss){const rc=s.rejectCount>0?'style="color:#ef4444;font-weight:bold"':'';
        html+=`<tr><td>${s.time}</td><td>${s.core}</td><td>${s.max}</td><td>${s.active}</td><td>${s.activeRate}</td><td>${s.queueSize}</td><td>${s.queueUsage}</td><td ${rc}>${s.rejectCount}</td></tr>`}
      html+='</table>';
    }
    document.getElementById('snapshotArea').innerHTML=html;
  }catch(e){}
}

// ==================== 历史 ====================
async function fetchHistory(){
  try{
    const r=await fetch(API+'/history');const j=await r.json();
    if(!j.length){document.getElementById('historyArea').innerHTML='<div style="color:#334155;font-size:11px">暂无调参记录</div>';return}
    let html='<table><tr><th>时间</th><th>线程池</th><th>原因</th><th>Core</th><th>Max</th></tr>';
    for(const h of j){
      const rc=h.reason==='EMERGENCY'?'color:#ef4444':h.reason==='MANUAL'?'color:#38bdf8':h.reason.includes('SHRINK')?'color:#fbbf24':'color:#4ade80';
      html+=`<tr><td>${h.time}</td><td>${h.pool}</td><td style="${rc}">${h.reason}</td><td>${h.oldCore}→${h.newCore}</td><td>${h.oldMax}→${h.newMax}</td></tr>`}
    html+='</table>';
    document.getElementById('historyArea').innerHTML=html;
  }catch(e){}
}

// ==================== 压测 ====================
async function sustainedStart(){
  const p=document.getElementById('selPool').value,r=document.getElementById('inRate').value,s=document.getElementById('inSleep').value;
  try{const res=await fetch(`${API}/sustained-start?pool=${p}&rate=${r}&sleepMs=${s}`,{method:'POST'});log(await res.text(),'lo')}catch(e){log('失败:'+e.message,'le')}
}
async function sustainedStop(){
  try{const res=await fetch(API+'/sustained-stop',{method:'POST'});log(await res.text(),'lw')}catch(e){log('失败:'+e.message,'le')}
}
async function oneShot(){
  const p=document.getElementById('selPool').value,c=document.getElementById('inCount').value,s=document.getElementById('inSleep').value;
  try{const res=await fetch(`${API}/pressure?pool=${p}&count=${c}&sleepMs=${s}`,{method:'POST'});log(await res.text(),'li')}catch(e){log('失败:'+e.message,'le')}
}

// ==================== 手动调参 ====================
async function manualAdjust(){
  const p=document.getElementById('adjPool').value,c=document.getElementById('adjCore').value,m=document.getElementById('adjMax').value;
  try{const res=await fetch(`${API}/adjust?pool=${p}&core=${c}&max=${m}`,{method:'POST'});log(await res.text(),'lo');fetchHistory()}catch(e){log('失败:'+e.message,'le')}
}

// ==================== 计划模式 ====================
function schedRowHtml(plan){
  const h=plan?String(plan.hour).padStart(2,'0'):'08',m=plan?String(plan.minute).padStart(2,'0'):'00';
  const core=plan?plan.corePoolSize:10,max=plan?plan.maximumPoolSize:20;
  const days=plan&&plan.daysOfWeek?plan.daysOfWeek:[];
  let dc='<div class="dchk">';
  for(let i=1;i<=7;i++){const ck=!days.length||days.includes(i)?'checked':'';dc+=`<label><input type="checkbox" value="${i}" ${ck}>${DN[i]}</label>`}
  dc+='</div>';
  return`<div class="srow"><label>时间</label><input type="time" value="${h}:${m}" class="st"><label>Core</label><input type="number" value="${core}" min="1" max="500" class="sc"><label>Max</label><input type="number" value="${max}" min="1" max="500" class="sm"><label>星期</label>${dc}<button class="btn br btn-sm" onclick="this.closest('.srow').remove()">✕</button></div>`;
}
function addSchedRow(plan){document.getElementById('schedRows').insertAdjacentHTML('beforeend',schedRowHtml(plan))}
async function loadSchedule(){
  const p=document.getElementById('schedPool').value;if(!p)return;
  try{const r=await fetch(`${API}/schedule/${p}`);const j=await r.json();
    document.getElementById('schedRows').innerHTML='';
    if(!j.length){log(p+' 暂无计划','li');return}
    j.forEach(x=>addSchedRow(x));log(`已加载 ${p} 的 ${j.length} 条计划`,'li');
  }catch(e){log('加载失败:'+e.message,'le')}
}
async function saveSched(){
  const p=document.getElementById('schedPool').value;
  const rows=document.querySelectorAll('.srow');const plans=[];
  rows.forEach(r=>{
    const t=r.querySelector('.st').value.split(':');
    const core=+r.querySelector('.sc').value,max=+r.querySelector('.sm').value;
    const ds=Array.from(r.querySelectorAll('.dchk input:checked')).map(c=>+c.value);
    plans.push({hour:+t[0],minute:+t[1],corePoolSize:core,maximumPoolSize:max,daysOfWeek:ds.length===7?null:ds});
  });
  try{const r=await fetch(`${API}/schedule/${p}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(plans)});log(await r.text(),'lo')}catch(e){log('保存失败:'+e.message,'le')}
}
async function clearSched(){
  const p=document.getElementById('schedPool').value;
  if(!confirm('确定清空 '+p+' 的计划？'))return;
  try{const r=await fetch(`${API}/schedule/${p}`,{method:'DELETE'});log(await r.text(),'lw');document.getElementById('schedRows').innerHTML=''}catch(e){log('失败:'+e.message,'le')}
}

// ==================== 报警配置 ====================
let alertEmails=[];
function renderEmailTags(){
  const c=document.getElementById('emailTags');
  c.innerHTML=alertEmails.map((e,i)=>`<span class="etag">📧 ${e}<span class="ex" onclick="removeEmail(${i})">×</span></span>`).join('');
}
function addEmail(){
  const inp=document.getElementById('newEmail');
  const v=inp.value.trim();
  if(!v)return;
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){log('邮箱格式不正确: '+v,'le');return}
  if(alertEmails.includes(v)){log('邮箱已存在: '+v,'lw');return}
  alertEmails.push(v);
  renderEmailTags();
  inp.value='';
  log('已添加收件人: '+v,'lo');
}
function removeEmail(i){
  const removed=alertEmails.splice(i,1)[0];
  renderEmailTags();
  log('已移除收件人: '+removed,'lw');
}
async function loadAlertConfig(){
  try{
    const r=await fetch(API+'/alert-config');const c=await r.json();
    document.getElementById('alertEnabled').checked=c.enabled;
    alertEmails=(c.toEmail||'').split(',').map(s=>s.trim()).filter(s=>s);
    renderEmailTags();
    document.getElementById('atReject').checked=c.rejectAlertEnabled!==false;
    document.getElementById('atActive').checked=c.activeAlertEnabled!==false;
    document.getElementById('atQueue').checked=c.queueAlertEnabled!==false;
    document.getElementById('atMemory').checked=c.memoryAlertEnabled!==false;
    document.getElementById('alertActiveT').value=Math.round((c.activeAlertThreshold||0.9)*100);
    document.getElementById('alertQueueT').value=Math.round((c.queueAlertThreshold||0.8)*100);
    document.getElementById('alertMemT').value=Math.round((c.memoryAlertThreshold||0.85)*100);
    document.getElementById('alertCooldown').value=c.alertCooldownSeconds||300;
    document.getElementById('alertEmailInterval').value=c.globalEmailIntervalSeconds||60;
  }catch(e){}
}
async function saveAlertConfig(){
  const cfg={
    enabled:document.getElementById('alertEnabled').checked,
    toEmail:alertEmails.join(','),
    rejectAlertEnabled:document.getElementById('atReject').checked,
    activeAlertEnabled:document.getElementById('atActive').checked,
    queueAlertEnabled:document.getElementById('atQueue').checked,
    memoryAlertEnabled:document.getElementById('atMemory').checked,
    activeAlertThreshold:parseInt(document.getElementById('alertActiveT').value)/100,
    queueAlertThreshold:parseInt(document.getElementById('alertQueueT').value)/100,
    memoryAlertThreshold:parseInt(document.getElementById('alertMemT').value)/100,
    alertCooldownSeconds:parseInt(document.getElementById('alertCooldown').value),
    globalEmailIntervalSeconds:parseInt(document.getElementById('alertEmailInterval').value)
  };
  try{const r=await fetch(API+'/alert-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});log(await r.text(),'lo')}catch(e){log('保存失败:'+e.message,'le')}
}
async function testAlert(){
  saveAlertConfig();
  log('配置已保存，等待下一个采集周期触发报警检查（如果有满足条件的报警会发邮件）','li');
}

// ==================== 报警记录 ====================
async function fetchAlerts(){
  try{
    const r=await fetch(API+'/alerts');const j=await r.json();
    if(!j.length){document.getElementById('alertArea').innerHTML='<div style="color:#334155;font-size:11px">暂无报警记录 ✅</div>';return}
    let html='<table><tr><th>时间</th><th>线程池</th><th>类型</th><th>级别</th><th>详情</th><th>邮件</th></tr>';
    for(const a of j){
      const lc=a.level==='CRITICAL'?'color:#ef4444;font-weight:bold':'color:#fbbf24';
      const tc=a.type==='REJECT'?'color:#ef4444':a.type==='MEMORY_HIGH'?'color:#f472b6':'color:#fbbf24';
      const ec=a.emailed===true?'<span style="color:#4ade80">✓ 已发</span>':a.emailed==='throttled'?'<span style="color:#fbbf24">⏳ 限流</span>':'<span style="color:#64748b">-</span>';
      html+=`<tr><td>${a.time}</td><td>${a.pool}</td><td style="${tc}">${a.type}</td><td style="${lc}">${a.level}</td><td style="text-align:left;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.message}">${a.message}</td><td>${ec}</td></tr>`}
    html+='</table>';
    document.getElementById('alertArea').innerHTML=html;
  }catch(e){}
}

// ==================== 刷新 ====================
async function fetchInstance(){
  try{const r=await fetch(API+'/instance');const j=await r.json();
    document.getElementById('instanceInfo').textContent='📍 '+j.applicationName+' @ '+j.instanceId;
  }catch(e){}
}
function refreshAll(){fetchStatus();fetchJvm();fetchTrend();fetchSnaps();fetchHistory();fetchAlerts()}
document.getElementById('chkAuto').addEventListener('change',()=>{
  if(document.getElementById('chkAuto').checked){if(!autoTimer)autoTimer=setInterval(refreshAll,3000)}
  else{clearInterval(autoTimer);autoTimer=null}
});
refreshAll();fetchInstance();loadAlertConfig();autoTimer=setInterval(refreshAll,3000);
</script>
